name: Build & Push Docker Images

  on:
    push:
      branches: [main, master]
    pull_request:
      branches: [main, master]

  env:
    REGISTRY: ghcr.io
    OWNER: ${{ github.repository_owner }}

  jobs:
    build:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write

      steps:
        - uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to GHCR
          if: github.event_name != 'pull_request'
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build kiro-gateway
          uses: docker/build-push-action@v5
          with:
            context: ./kiro-gateway
            push: ${{ github.event_name != 'pull_request' }}
            tags: |
              ${{ env.REGISTRY }}/${{ env.OWNER }}/kiro-gateway:latest
              ${{ env.REGISTRY }}/${{ env.OWNER }}/kiro-gateway:${{ github.sha }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

        - name: Build kiro-go
          uses: docker/build-push-action@v5
          with:
            context: ./kiro-go
            push: ${{ github.event_name != 'pull_request' }}
            tags: |
              ${{ env.REGISTRY }}/${{ env.OWNER }}/kiro-go:latest
              ${{ env.REGISTRY }}/${{ env.OWNER }}/kiro-go:${{ github.sha }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
