name: Build And Push Images

on:
  push:
    branches:
      - main
    paths:
      - "kiro-go/**"
      - "kiro-gateway/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Normalize Image Owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push kiro-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./kiro-gateway
          file: ./kiro-gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/kiro-stack-kiro-gateway:latest
            ghcr.io/${{ env.OWNER_LC }}/kiro-stack-kiro-gateway:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build And Push kiro-go
        uses: docker/build-push-action@v6
        with:
          context: ./kiro-go
          file: ./kiro-go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/kiro-stack-kiro-go:latest
            ghcr.io/${{ env.OWNER_LC }}/kiro-stack-kiro-go:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
