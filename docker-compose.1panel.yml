services:
  kiro-gateway:
    image: ghcr.io/muqing-kg/kiro-gateway:latest
    container_name: kiro-gateway
    restart: unless-stopped
    environment:
      PROXY_API_KEY: "CHANGE_ME_WITH_RANDOM_SECRET"
      VPN_PROXY_URL: ""
      DEBUG_MODE: "off"
      SKIP_STARTUP_CREDENTIAL_CHECK: "true"
    expose:
      - "8000"

  kiro-go:
    image: ghcr.io/muqing-kg/kiro-go:latest
    container_name: kiro-go
    restart: unless-stopped
    depends_on:
      - kiro-gateway
    ports:
      - "8088:8080"
    volumes:
      - /data/kiro-stack/kiro-go-data:/app/data
    environment:
      CONFIG_PATH: "/app/data/config.json"
      ADMIN_PASSWORD: "CHANGE_ME_WITH_STRONG_PASSWORD"
      KIRO_GATEWAY_BASE: "http://kiro-gateway:8000"
      KIRO_GATEWAY_API_KEY: "CHANGE_ME_WITH_RANDOM_SECRET"
